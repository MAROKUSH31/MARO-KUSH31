<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARO-KUSH31</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#111,#222);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:500px;
padding:30px;
}

h1{
font-size:3rem;
margin-bottom:15px;
color:#00ff88;
}

p{
font-size:1.2rem;
margin-bottom:30px;
color:#ddd;
}

a{
display:inline-block;
padding:15px 35px;
background:#00ff88;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:30px;
transition:.3s;
}

a:hover{
background:white;
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
<h1>MARO-KUSH31</h1>
<p>Bienvenue sur notre site officiel.</p>
